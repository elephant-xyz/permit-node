Comment: Permit Preparation workflow. Processes CSV files, generates permit data, splits into chunks, and publishes to SQS for parallel processing.
StartAt: PreparePermits
States:
  PreparePermits:
    Type: Task
    Resource: arn:aws:states:::lambda:invoke
    Parameters:
      FunctionName: ${PreparePermitsFunction}
      Payload.$: $.message
    # Store full Lambda invoke result under $.permits so we can use it in next steps
    ResultSelector:
      chunk_s3_uris.$: $.Payload.chunk_s3_uris
      portal_zip_s3_uri.$: $.Payload.portal_zip_s3_uri
      total_chunks.$: $.Payload.total_chunks
      sqs_messages_sent.$: $.Payload.sqs_messages_sent
    ResultPath: $.permits
    Retry:
      - ErrorEquals:
          [
            Lambda.ServiceException,
            Lambda.AWSLambdaException,
            Lambda.SdkClientException,
          ]
        IntervalSeconds: 2
        MaxAttempts: 2
        BackoffRate: 2
    End: true
